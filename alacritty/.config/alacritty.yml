env:
  TERM: xterm-256color
window:
  dimensions:
    columns: 85
    lines: 85
  startup_mode: Windowed
# Colors (Dracula)
colors:
  # Default colors
  primary:
    background: '#282a36'
    foreground: '#f8f8f2'

  # Normal colors
  normal:
    black:   '#000000'
    red:     '#ff5555'
    green:   '#50fa7b'
    yellow:  '#f1fa8c'
    blue:    '#caa9fa'
    magenta: '#ff79c6'
    cyan:    '#8be9fd'
    white:   '#bfbfbf'

  # Bright colors
  bright:
    black:   '#575b70'
    red:     '#ff6e67'
    green:   '#5af78e'
    yellow:  '#f4f99d'
    blue:    '#caa9fa'
    magenta: '#ff92d0'
    cyan:    '#9aedfe'
    white:   '#e6e6e6'


# Font configuration (changes require restart)
font:
  normal:
    family: Fira Code
    style: Retina

  bold:
    family: Fira Code

  italic:
    family: Fira Code
  
  size: 12.0

background_opacity: 0.8

dynamic_title: true

mouse:
  url:
    launcher: firefox
    args:
      - --new-window


key_bindings:
  - { key: V,        mods: Control,       action: Paste                        }
    #- { key: C,        mods: Control,       action: Copy                         }
  - { key: Q,        mods: Control,       action: Quit                         }
  - { key: N,        mods: Control,       action: SpawnNewInstance             }
  - { key: Return,   mods: Control,       action: ToggleFullscreen             }

selection:
  save_to_clipboard: true
